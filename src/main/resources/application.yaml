spring:
  application:
    name: projectbanking

  datasource:
    url: jdbc:h2:mem:bankdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# Swagger / OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui/index.html
    config-url: ""  # ⚡ отключаем remote config, чтобы не было ошибок

# Настройки безопасности (можно потом заменить)
security:
  user:
    name: admin
    password: admin
    roles: ADMIN

# Настройки сервера
server:
  port: 8080

# JWT
jwt:
  # This key is for development purposes only.
  # In production, it MUST be replaced via the JWT_SECRET environment variable.
  secret: ${JWT_SECRET:dev_secret_key_for_local_testing_only_replace_in_production}
  access-expiration: 15m
  refresh-expiration: 7d